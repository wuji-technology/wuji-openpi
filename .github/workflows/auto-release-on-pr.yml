name: Auto Release on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  create-tag:
    name: Create release tag
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'auto-release') &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "::error::Branch '$BRANCH' does not match release/vX.Y.Z[-rcN]"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name  "wuji-release-bot"
          git config user.email "release-bot@wuji-technology.local"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::warning::Tag $VERSION already exists, skipping"
            exit 0
          fi

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
